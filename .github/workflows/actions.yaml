name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # This enables you to run this workflow manually from the Actions tab.
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: pnpm install
      - run: pnpm --filter client lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: pnpm install
      - run: pnpm --filter client test

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: pnpm install
      - run: pnpm --filter client exec playwright install --with-deps
      - run: pnpm --filter client test:e2e
